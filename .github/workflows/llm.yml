name: Run Tiny LLM

on:
  workflow_dispatch:

jobs:
  llm:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential cmake wget

      - name: Clone llama.cpp
        run: |
          git clone https://github.com/ggml-org/llama.cpp.git

      - name: Build llama.cpp
        run: |
          cd llama.cpp
          cmake -B build
          cmake --build build -j$(nproc)

      - name: Download model
        run: |
          wget -O model.gguf https://huggingface.co/bartowski/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf

      - name: Run model
        run: |
          ./llama.cpp/build/bin/llama-cli \
            -m model.gguf \
            -p "Hello, respond briefly." \
            -st \
            -n 32 \
            --temp 0.2 \
            --top-p 0.9 \
            --repeat-penalty 1.2 \
            --no-show-timings
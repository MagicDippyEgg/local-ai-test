name: Run Tiny LLM (Proper Fast Cache)

on:
  workflow_dispatch:

jobs:
  llm:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential cmake wget

      - name: Cache binary
        id: cache-bin
        uses: actions/cache@v4
        with:
          path: llama-cli
          key: llama-cli-v1

      - name: Build llama.cpp ONLY if no binary
        run: |
          if [ -f llama-cli ]; then
            echo "Using cached binary"
          else
            echo "Building once..."
            git clone https://github.com/ggml-org/llama.cpp.git
            cd llama.cpp
            cmake -B build
            cmake --build build -j$(nproc)

            cp build/bin/llama-cli ../llama-cli
          fi

      - name: Cache model
        uses: actions/cache@v4
        with:
          path: model.gguf
          key: qwen-model-v1

      - name: Download model if needed
        run: |
          if [ ! -f model.gguf ]; then
            wget -O model.gguf https://huggingface.co/bartowski/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf
          fi

      - name: Run model
        run: |
          ./llama-cli \
            -m model.gguf \
            -p "Hello, respond briefly." \
            -n 32 \
            -st \
            --temp 0.2 \
            --top-p 0.9 \
            --repeat-penalty 1.2
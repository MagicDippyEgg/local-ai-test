name: Run Tiny LLM (Fast)

on:
  workflow_dispatch:

jobs:
  llm:
    runs-on: ubuntu-latest

    steps:
      - name: Download llama.cpp prebuilt binary
        run: |
          wget -O llama.tar.gz https://github.com/ggml-org/llama.cpp/releases/latest/download/llama-binaries-linux-x64.tar.gz
          tar -xzf llama.tar.gz

      - name: Cache model
        uses: actions/cache@v4
        with:
          path: model.gguf
          key: llama-model-qwen25-05b

      - name: Download model (if not cached)
        run: |
          if [ ! -f model.gguf ]; then
            wget -O model.gguf https://huggingface.co/bartowski/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf
          fi

      - name: Run model
        run: |
          ./llama-cli \
            -m model.gguf \
            -p "Hello, respond briefly." \
            -n 32 \
            -st \
            --temp 0.2 \
            --top-p 0.9 \
            --repeat-penalty 1.2
name: Run Tiny LLM (Cached Build)

on:
  workflow_dispatch:

jobs:
  llm:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential cmake wget

      - name: Cache llama.cpp build
        uses: actions/cache@v4
        with:
          path: llama.cpp/build
          key: llama-build-v1

      - name: Clone llama.cpp (if needed)
        run: |
          if [ ! -d llama.cpp ]; then
            git clone https://github.com/ggml-org/llama.cpp.git
          fi

      - name: Build llama.cpp (only if missing)
        run: |
          cd llama.cpp
          cmake -B build
          cmake --build build -j$(nproc)

      - name: Cache model
        uses: actions/cache@v4
        with:
          path: model.gguf
          key: qwen-model-v1

      - name: Download model (if missing)
        run: |
          if [ ! -f model.gguf ]; then
            wget -O model.gguf https://huggingface.co/bartowski/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf
          fi

      - name: Run model
        run: |
          ./llama.cpp/build/bin/llama-cli \
            -m model.gguf \
            -p "Hello, respond briefly." \
            -n 32 \
            -st \
            --temp 0.2 \
            --top-p 0.9 \
            --repeat-penalty 1.2
name: Run Tiny LLM (Fast Stable)

on:
  workflow_dispatch:

jobs:
  llm:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar jq

      - name: Get latest llama.cpp release asset
        run: |
          URL=$(curl -s https://api.github.com/repos/ggml-org/llama.cpp/releases/latest \
            | jq -r '.assets[] | select(.name | contains("linux") and contains("x64")) | .browser_download_url' \
            | head -n 1)

          echo "Downloading: $URL"
          wget -O llama.tar.gz "$URL"

          tar -xzf llama.tar.gz
          ls -R .

      - name: Cache model
        uses: actions/cache@v4
        with:
          path: model.gguf
          key: qwen25-model

      - name: Download model (if needed)
        run: |
          if [ ! -f model.gguf ]; then
            wget -O model.gguf https://huggingface.co/bartowski/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf
          fi

      - name: Run model
        run: |
          ./llama-cli \
            -m model.gguf \
            -p "Hello, respond briefly." \
            -n 32 \
            -st \
            --temp 0.2 \
            --top-p 0.9 \
            --repeat-penalty 1.2
name: Run Tiny LLM (Actually Fixed)

on:
  workflow_dispatch:

jobs:
  llm:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential cmake wget

      - name: Clone llama.cpp (stable version)
        run: |
          git clone https://github.com/ggml-org/llama.cpp.git
          cd llama.cpp
          git checkout b4d5c7b || true

      - name: Build llama.cpp
        run: |
          cd llama.cpp
          cmake -B build
          cmake --build build -j$(nproc)

      - name: Download model
        run: |
          wget -O model.gguf https://huggingface.co/bartowski/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf

      - name: Run model (fixed chat template)
        run: |
          ./llama.cpp/build/bin/llama-cli \
            -m model.gguf \
            -p "Hello" \
            -cnv \
            --chat-template qwen2 \
            -n 32 \
            --temp 0.3 \
            --top-p 0.9 \
            --repeat-penalty 1.2 \
            --seed 1